<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>做点什么</title>
<meta name="theme-color" content="#667eea">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="做点什么">
<link rel="apple-touch-icon" href="icons/icon-192.png">
<link rel="manifest" href="manifest.json">
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    font-family: "PingFang SC", "Microsoft YaHei", sans-serif;
    background: #0f0f1a;
    color: #eee;
    min-height: 100dvh;
    display: flex;
    justify-content: center;
    align-items: center;
    overflow-x: hidden;
    user-select: none;
  }

  .app {
    width: 100%;
    max-width: 440px;
    padding: 24px 20px;
    display: flex;
    flex-direction: column;
    gap: 20px;
    min-height: 100dvh;
  }

  /* ---- 头部 ---- */
  .header {
    text-align: center;
    padding-top: 10px;
  }
  .header h1 {
    font-size: 26px;
    font-weight: 800;
    letter-spacing: 2px;
  }
  .header .sub {
    font-size: 13px;
    color: #666;
    margin-top: 4px;
  }

  /* ---- 标签筛选 ---- */
  .tags {
    display: flex;
    gap: 8px;
    flex-wrap: wrap;
    justify-content: center;
  }
  .tag {
    padding: 6px 14px;
    border-radius: 20px;
    font-size: 13px;
    border: 1px solid rgba(255,255,255,0.15);
    background: transparent;
    color: #aaa;
    cursor: pointer;
    transition: all 0.2s;
    white-space: nowrap;
  }
  .tag.on {
    background: rgba(100, 180, 255, 0.2);
    border-color: rgba(100, 180, 255, 0.5);
    color: #8cc8ff;
  }

  /* ---- 时间筛选 ---- */
  .time-row {
    display: flex;
    gap: 6px;
    justify-content: center;
  }
  .time-btn {
    padding: 6px 12px;
    border-radius: 16px;
    font-size: 12px;
    border: 1px solid rgba(255,255,255,0.1);
    background: transparent;
    color: #888;
    cursor: pointer;
    transition: all 0.2s;
  }
  .time-btn.on {
    background: rgba(255,180,100,0.15);
    border-color: rgba(255,180,100,0.4);
    color: #f0b060;
  }

  /* ---- 主卡片 ---- */
  .card-wrap {
    flex: 1;
    display: flex;
    flex-direction: column;
    justify-content: center;
    perspective: 1000px;
  }
  .card {
    background: linear-gradient(145deg, #1a1a30, #141428);
    border: 1px solid rgba(255,255,255,0.06);
    border-radius: 24px;
    padding: 36px 28px;
    text-align: center;
    min-height: 300px;
    display: flex;
    flex-direction: column;
    justify-content: center;
    align-items: center;
    gap: 16px;
    transition: transform 0.5s cubic-bezier(0.34, 1.56, 0.64, 1), opacity 0.3s;
    position: relative;
    overflow: hidden;
  }
  .card.flip {
    transform: rotateY(90deg);
    opacity: 0;
  }
  .card .emoji {
    font-size: 64px;
    transition: transform 0.3s;
  }
  .card .title {
    font-size: 22px;
    font-weight: 700;
    line-height: 1.4;
  }
  .card .desc {
    font-size: 14px;
    color: #999;
    line-height: 1.7;
    max-width: 300px;
  }
  .card .meta {
    display: flex;
    gap: 12px;
    font-size: 12px;
    color: #666;
  }
  .card .meta span {
    background: rgba(255,255,255,0.05);
    padding: 4px 10px;
    border-radius: 10px;
  }

  /* 初始状态 */
  .card.init .emoji { font-size: 80px; }
  .card.init .title { font-size: 18px; color: #777; font-weight: 400; }

  /* ---- 按钮 ---- */
  .btn-row {
    display: flex;
    gap: 12px;
    justify-content: center;
  }
  .btn {
    padding: 14px 32px;
    border-radius: 28px;
    font-size: 16px;
    font-weight: 600;
    border: none;
    cursor: pointer;
    transition: all 0.2s;
    letter-spacing: 1px;
  }
  .btn:active { transform: scale(0.95); }
  .btn-main {
    background: linear-gradient(135deg, #667eea, #764ba2);
    color: white;
    flex: 1;
    max-width: 200px;
  }
  .btn-ghost {
    background: transparent;
    border: 1px solid rgba(255,255,255,0.2);
    color: #aaa;
    padding: 14px 24px;
  }

  /* ---- 计数器 ---- */
  .counter {
    text-align: center;
    font-size: 12px;
    color: #444;
  }

  /* ---- Toast ---- */
  .toast {
    position: fixed;
    top: 20px;
    left: 50%;
    transform: translateX(-50%);
    background: rgba(100,120,255,0.3);
    backdrop-filter: blur(10px);
    padding: 10px 24px;
    border-radius: 20px;
    font-size: 13px;
    pointer-events: none;
    opacity: 0;
    transition: opacity 0.3s;
    z-index: 10;
  }
  .toast.show { opacity: 1; }

  /* ---- 手指动画 ---- */
  @keyframes bounce {
    0%, 100% { transform: translateY(0); }
    50% { transform: translateY(-6px); }
  }
  .hint-arrow {
    animation: bounce 1.5s ease-in-out infinite;
    color: #667eea;
    font-size: 14px;
  }
</style>
</head>
<body>

<div class="app">
  <div class="header">
    <h1>🎯 做点什么</h1>
    <div class="sub">别刷短视频了，试试这些</div>
  </div>

  <!-- 类型标签 -->
  <div class="tags" id="typeTags">
    <button class="tag on" data-type="all">全部</button>
    <button class="tag" data-type="move">🏃 动一动</button>
    <button class="tag" data-type="make">✋ 动手做</button>
    <button class="tag" data-type="think">🧠 动脑子</button>
    <button class="tag" data-type="social">💬 社交</button>
    <button class="tag" data-type="chill">😌 放松</button>
  </div>

  <!-- 时间 -->
  <div class="time-row" id="timeBtns">
    <button class="time-btn on" data-time="all">不限</button>
    <button class="time-btn" data-time="5">5分钟</button>
    <button class="time-btn" data-time="15">15分钟</button>
    <button class="time-btn" data-time="30">半小时</button>
    <button class="time-btn" data-time="60">1小时+</button>
  </div>

  <!-- 卡片 -->
  <div class="card-wrap">
    <div class="card" id="card" onclick="roll()">
      <div class="emoji">🎯</div>
      <div class="title">加载中……</div>
      <div class="desc">马上就好</div>
    </div>
  </div>

  <!-- 按钮 -->
  <div class="btn-row">
    <button class="btn btn-main" onclick="roll()">🎲 再来一个</button>
    <button class="btn btn-ghost" id="likeBtn" onclick="likeIt()" style="display:none;">❤️ 就这个</button>
  </div>

  <div class="counter" id="counter">已经帮你找到了 0 个选项</div>
</div>

<div class="toast" id="toast"></div>

<script>
// ============ 活动库（从 data.json 加载，支持热更新）============
let activities = [];

async function loadActivities() {
  try {
    const resp = await fetch('data.json');
    if (resp.ok) {
      activities = await resp.json();
      console.log('✅ 已加载 ' + activities.length + ' 条活动');
    }
  } catch (e) {
    console.log('⚠️ 加载失败，使用内置数据');
  }
  // 内置兜底
  if (!activities.length) {
    activities = [
      { emoji:'🧘', title:'做 5 分钟拉伸', desc:'站起来，把手臂举过头顶，弯腰摸脚趾。你的脊椎会感谢你。', type:'move', time:5 },
      { emoji:'🚶', title:'出去走一圈', desc:'换口气，看看天，感受风吹在脸上。', type:'move', time:15 },
      { emoji:'📖', title:'读一章书', desc:'拿一本真正的书，读一章。哪怕就读三页。', type:'think', time:15 },
      { emoji:'🍳', title:'做一道没做过的菜', desc:'打开冰箱看看有什么，跟着菜谱做。', type:'make', time:30 },
      { emoji:'📞', title:'给一个好久没联系的人发消息', desc:'发一句"突然想到你，最近怎么样"。', type:'social', time:5 },
      { emoji:'😴', title:'闭眼躺 10 分钟', desc:'不是睡觉，就是闭眼。让脑子里声音飘。', type:'chill', time:15 },
    ];
  }
  roll(); // 加载完立刻展示
}

// ============ 状态 ============
let currentType = 'all';
let currentTime = 'all';
let count = 0;
let currentActivity = null;
let seen = [];

const card = document.getElementById('card');
const counter = document.getElementById('counter');
const likeBtn = document.getElementById('likeBtn');
const toast = document.getElementById('toast');

// ============ 筛选标签 ============
document.getElementById('typeTags').addEventListener('click', e => {
  if (e.target.classList.contains('tag')) {
    document.querySelectorAll('#typeTags .tag').forEach(t => t.classList.remove('on'));
    e.target.classList.add('on');
    currentType = e.target.dataset.type;
    roll();
  }
});

document.getElementById('timeBtns').addEventListener('click', e => {
  if (e.target.classList.contains('time-btn')) {
    document.querySelectorAll('#timeBtns .time-btn').forEach(t => t.classList.remove('on'));
    e.target.classList.add('on');
    currentTime = e.target.dataset.time;
    roll();
  }
});

// ============ 核心：抽一个活动 ============
function getFiltered() {
  return activities.filter(a => {
    if (currentType !== 'all' && a.type !== currentType) return false;
    if (currentTime !== 'all') {
      const max = parseInt(currentTime);
      if (max === 60) return a.time >= 30;
      if (max === 30) return a.time >= 15 && a.time <= 30;
      if (max === 15) return a.time >= 5 && a.time <= 15;
      if (max === 5) return a.time <= 5;
    }
    return true;
  });
}

function roll() {
  const pool = getFiltered();

  if (pool.length === 0) {
    showResult({ emoji:'😅', title:'这个组合没有选项', desc:'换个筛选条件试试？', type:'', time:0 });
    return;
  }

  // 避免连续重复
  let candidates = pool.filter(a => a !== currentActivity);
  if (candidates.length === 0) candidates = pool;

  // 优先没出现过的
  let fresh = candidates.filter(a => !seen.includes(a.title));
  const pick = fresh.length > 0
    ? fresh[Math.floor(Math.random() * fresh.length)]
    : candidates[Math.floor(Math.random() * candidates.length)];

  seen.push(pick.title);
  if (seen.length > 50) seen.shift();
  currentActivity = pick;
  count++;

  showResult(pick);
  counter.textContent = `已经帮你找到了 ${count} 个选项`;
  likeBtn.style.display = 'block';
}

function showResult(activity) {
  card.classList.add('flip');
  card.classList.remove('init');

  setTimeout(() => {
    card.innerHTML = `
      <div class="emoji">${activity.emoji}</div>
      <div class="title">${activity.title}</div>
      <div class="desc">${activity.desc}</div>
      <div class="meta">
        <span>⏱ ${activity.time}分钟</span>
        <span>${typeLabel(activity.type)}</span>
      </div>
    `;
    card.classList.remove('flip');
  }, 200);
}

function typeLabel(t) {
  const map = { move:'🏃 动一动', make:'✋ 动手', think:'🧠 动脑', social:'💬 社交', chill:'😌 放松' };
  return map[t] || '';
}

function likeIt() {
  showToast('❤️ 去吧！你会喜欢的～');
}

function showToast(msg) {
  toast.textContent = msg;
  toast.classList.add('show');
  setTimeout(() => toast.classList.remove('show'), 1800);
}

// ============ 初始化 ============
// 启动：先加载数据再展示
loadActivities();

// ============ PWA 安装 ============
if ('serviceWorker' in navigator) {
  navigator.serviceWorker.register('sw.js');
}

let deferredPrompt;
window.addEventListener('beforeinstallprompt', (e) => {
  e.preventDefault();
  deferredPrompt = e;
  // 用户点三次卡片后提示安装
  let clickCount = 0;
  document.getElementById('card').addEventListener('click', () => {
    clickCount++;
    if (clickCount === 5 && deferredPrompt) {
      showToast('📲 点右上角「添加到桌面」就能像App一样用啦');
      // 自动弹出安装提示
      setTimeout(() => {
        if (deferredPrompt) deferredPrompt.prompt();
      }, 2000);
    }
  });
});

// iOS 提示横幅
function showIOSBanner() {
  if (/iPhone|iPad|iPod/.test(navigator.userAgent) && !navigator.standalone) {
    setTimeout(() => {
      const banner = document.createElement('div');
      banner.style.cssText = 'position:fixed;top:0;left:0;right:0;background:rgba(102,126,234,0.95);color:#fff;padding:12px 16px;font-size:13px;text-align:center;z-index:99;';
      banner.innerHTML = '📲 点击下方 <b>分享</b> → <b>添加到主屏幕</b>，像App一样使用';
      banner.onclick = () => banner.remove();
      document.body.prepend(banner);
      setTimeout(() => banner.remove(), 5000);
    }, 3000);
  }
}
showIOSBanner();
</script>
</body>
</html>
